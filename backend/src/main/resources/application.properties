spring.application.name=resumehub

server.port=${PORT:8080}
server.tomcat.max-http-post-size=5MB

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/resumehub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:ResumeHubSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm2024}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS (dev)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080}


# Resend API
app.resend.api-key=${RESEND_API_KEY:}

