<div class="resume-page template-graduate">
  <header class="resume-header">
    <div>
      <p class="resume-kicker">Professional Resume</p>
      <h1 id="previewName">Your Name</h1>
      <h2 id="previewRole">Your Role</h2>
    </div>
    <div class="contact-info" id="previewContact"></div>
  </header>

  <section class="resume-section summary-section">
    <h3>Summary</h3>
    <p id="previewSummary"></p>
  </section>

  <div class="resume-columns">
    <main>
      <section class="resume-section" data-preview-section="experience">
        <h3>Experience</h3>
        <div id="experienceBlock"></div>
      </section>

      <section class="resume-section" data-preview-section="projects">
        <h3>Projects</h3>
        <div id="projectsBlock"></div>
      </section>
    </main>

    <aside>
      <section class="resume-section">
        <h3>Skills</h3>
        <div class="skills-list" id="previewSkills"></div>
      </section>

      <section class="resume-section" data-preview-section="education">
        <h3>Education</h3>
        <div id="educationBlock"></div>
      </section>

      <section class="resume-section" data-preview-section="certifications">
        <h3>Certifications</h3>
        <div id="certificationsBlock"></div>
      </section>
    </aside>
  </div>
</div>
