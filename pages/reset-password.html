<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeHub | Reset Password</title>
    <link rel="icon" type="image/png" href="/assets/icons/favicon-32.png" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="auth-page">
    <header class="navbar">
      <a class="logo" href="/">
        <img class="logo-image" src="/assets/icons/resumehub-logo.png" alt="ResumeHub" />
      </a>
      <a class="navbar-wordmark" href="/" aria-label="ResumeHub home">
        Resume<span>Hub</span>
      </a>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
      <div class="auth-buttons"></div>
    </header>

    <main>
      <section class="auth-card">
        <h1>Reset Password</h1>
        <p>Please enter the OTP code sent to your email, along with your new password.</p>
        <div id="authError" class="auth-error hidden"></div>
        <div id="authSuccess" class="form-message success hidden"></div>
        <form id="resetForm" class="auth-form">
          <label>
            Email Address
            <input type="email" id="email" name="email" required placeholder="name@email.com" />
          </label>
          <label>
            OTP Code
            <input type="text" id="otp" name="otp" required minlength="6" maxlength="6" pattern="\d{6}" placeholder="6-digit OTP code" />
          </label>
          <label>
            New Password
            <input type="password" id="newPassword" name="password" required minlength="6" placeholder="At least 6 characters" />
          </label>
          <label>
            Confirm Password
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Repeat new password" />
          </label>
          <button id="authSubmit" class="primary-btn" type="submit">Reset Password</button>
        </form>
        <p class="auth-switch">Remember your password? <a href="/login">Sign in</a></p>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/reset-password.js"></script>
  </body>
</html>
