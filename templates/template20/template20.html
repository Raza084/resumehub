<div class="resume-page template-blue-timeline">
  <aside class="resume-sidebar">
    <section class="resume-section contact-block">
      <h3>Contact</h3>
      <div class="contact-info" id="previewContact"></div>
    </section>

    <section class="resume-section" data-preview-section="education">
      <h3>Education</h3>
      <div id="educationBlock"></div>
    </section>

    <section class="resume-section">
      <h3>Skills</h3>
      <div class="skills-list" id="previewSkills"></div>
    </section>
  </aside>

  <main class="resume-main">
    <header class="resume-header">
      <h1 id="previewName">Your Name</h1>
      <h2 id="previewRole">Your Role</h2>
    </header>

    <section class="resume-section">
      <h3>Profile</h3>
      <p id="previewSummary"></p>
    </section>

    <section class="resume-section timeline-section" data-preview-section="projects">
      <h3>Projects</h3>
      <div id="projectsBlock"></div>
    </section>

    <section class="resume-section timeline-section" data-preview-section="certifications">
      <h3>Certifications</h3>
      <div id="certificationsBlock"></div>
    </section>

    <section class="resume-section timeline-section" data-preview-section="experience">
      <h3>Experience</h3>
      <div id="experienceBlock"></div>
    </section>
  </main>
</div>
